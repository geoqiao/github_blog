# ============================================
# 仓库配置（必填）
# ============================================
github:
  repo: geoqiao/geoqiao.github.io
  username: geoqiao

# ============================================
# 博客配置（必填）
# ============================================
blog:
  title: geoqiao's Blog
  url: https://geoqiao.github.io/
  author: geoqiao

# ============================================
# 关于配置（需要修改）
# ============================================
about:
  avatar: https://github.com/geoqiao.png
  bio: |
    你好，我是 geoqiao。
    一名金融行业的贷后策略分析师，喜欢折腾工具，也享受用代码解决重复性工作。
    工作之余，我喜欢记录生活中的碎片。
  expertise:
    - 金融数据分析
    - 贷后策略与风控
    - Python 自动化工具
  links:
    - name: GitHub
      url: https://github.com/geoqiao
    - name: Twitter/X
      url: https://twitter.com/geoqiao

# ============================================
# 使用声明（开源相关，建议保留）
# ============================================
branding:
  show_powered_by: true
  powered_by_text: github_blog
  powered_by_url: https://github.com/geoqiao/github-blog
  show_intro: true
  intro_text: This is a static blog system based on GitHub Issues.
  intro_text2: Generated with Python + Jinja2, deployed via GitHub Actions.
  source_link_text: View source code →
  source_link_url: https://github.com/geoqiao/github-blog

# ============================================
# 生成路径配置
# ============================================
paths:
  output: output
  theme: BearMinimal
  blog: blog
  tag: tag
  rss: atom.xml
  about: about.html
  page_size: 10
  home_post_count: 10
  language: zh-CN

# ============================================
# SEO 配置
# ============================================
seo:
  google_search_console: DRggZlykSzc8M9TyaS0BPSRE7Kvw8W9hHt5pZrIMm3Y
  enable_sitemap: true
  enable_robots: true

# ============================================
# 评论配置
# ============================================
comments:
  provider: utterances
  repo: ""
  theme: github-light
  theme_mode: auto  # "auto" = follow blog theme (github-light/photon-dark), or specific theme name

# ============================================
# 安全配置
# ============================================
security:
  token_env: G_T
