# ============================================
# Core (required)
# ============================================
blog:
  title: "Blog Title"
  description: Short description
  url: https://example.com
  author: Your Name

github:
  repo: username/repo

about:
  avatar: https://example.com/avatar.jpg
  bio: |
    A short bio about yourself.
  expertise:
    - Python
    - DevOps
  links:
    - name: GitHub
      url: https://github.com/username

