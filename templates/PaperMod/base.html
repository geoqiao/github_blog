<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="{{ google_search_verification }}" />
    <title>{% block title %}{{ blog_title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ meta_description }}{% endblock %}">
    {% block canonical %}{% endblock %}

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ blog_url }}{% endblock %}">
    <meta property="og:site_name" content="{{ blog_title }}">
    <meta property="og:title" content="{% block og_title %}{{ blog_title }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ meta_description }}{% endblock %}">
    <meta property="og:image"
        content="{% block og_image %}{{ blog_url.rstrip('/') }}/templates/PaperMod/static/images/favicon.png{% endblock %}">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:url" content="{% block twitter_url %}{{ blog_url }}{% endblock %}">
    <meta name="twitter:title" content="{% block twitter_title %}{{ blog_title }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ meta_description }}{% endblock %}">
    <meta name="twitter:image"
        content="{% block twitter_image %}{{ blog_url.rstrip('/') }}/templates/PaperMod/static/images/favicon.png{% endblock %}">

    <link rel="stylesheet" href="/templates/PaperMod/static/css/papermod.css">
    <link rel="stylesheet" href="/templates/default_theme/static/css/prism.css">
    <link rel="alternate" type="application/atom+xml" title="RSS" href="/contents/{{ rss_atom_path }}">
    <link rel="icon" type="image/png" href="/templates/PaperMod/static/images/favicon.png">
    {% block extra_head %}{% endblock %}
</head>

<body>
    <header class="pm-header">
        <nav class="container nav">
            <a href="/" class="logo">
                <img class="logo-avatar" src="/templates/PaperMod/static/images/favicon.png" alt="{{ blog_title }}">
                <span>{{ blog_title }}</span>
            </a>

            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
                <button class="menu-toggle" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>

            <ul class="nav-links">
                <li><a href="/contents/">Blog</a></li>
                <li><a href="/contents/tags">Tag</a></li>
                <li><a href="/contents/about.html">About</a></li>
                <li><a href="/contents/{{ rss_atom_path }}">RSS</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="pm-footer">
        <div class="container">
            <p id="site-year">&copy; <span id="year"></span> {{ blog_title }}</p>
        </div>
    </footer>

    <script src="/templates/PaperMod/static/js/papermod.js"></script>
    <!-- prism is reused from default theme -->
    <script src="/templates/default_theme/static/js/prism.js"></script>
</body>

</html>
