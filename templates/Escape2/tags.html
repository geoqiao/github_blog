{% extends "base.html" %}

{% block content %}
<section class="tags-page">
    <h1>All Tags</h1>
    
    <div class="tag-cloud">
        {% for tag in tag_items %}
        <a href="/tag/{{ tag.name }}/" class="tag" style="font-size: {{ 0.8 + tag.count * 0.2 }}rem;">
            {{ tag.name }} ({{ tag.count }})
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
