{% extends "base.html" %}

{% block content %}
<section class="tag-page">
    <h1>Posts tagged "{{ tag_name }}"</h1>
    
    {% for issue in issues %}
    <article class="post-card">
        <h2 class="post-title">
            <a href="/blog/{{ issue_slugs[issue.number|string] }}.html">{{ issue.title }}</a>
        </h2>
        <div class="post-meta">
            <span class="date">{{ issue.created_at.strftime('%Y-%m-%d') }}</span>
        </div>
        <p class="post-excerpt">{{ issue.body[:200] }}...</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
