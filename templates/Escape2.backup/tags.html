{% extends "base.html" %}

{% block content %}
<section class="tags-page">
    <h1>All Tags</h1>
    
    <div class="tags-list">
        {% for tag in tag_items %}
        <a href="/tag/{{ tag.name }}/" class="tag-link">
            <span class="tag-name">{{ tag.name }}</span>
            <span class="tag-count">{{ tag.count }}</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
