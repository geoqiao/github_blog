{% extends 'base.html' %}

{% block title %}Tags - {{ blog_title }}{% endblock %}

{% block canonical %}
<link rel="canonical" href="{{ blog_url }}tag/" />
{% endblock %}

{% block content %}
<h1>{{ tags_config.page_title }}</h1>

<div class="tag-list">
    {% for item in tag_items %}
    <span class="tag">
        <a href="/tag/{{ item.name }}.html">{{ item.name }} <span class="tag-count">{{ item.count }}</span></a>
    </span>
    {% endfor %}
</div>
{% endblock %}
