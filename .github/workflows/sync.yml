name: Sync Trigger to Geoqiao Pages

on:
  push:
    paths:
      - '.github/workflows/trigger.yml'
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout escaping
        uses: actions/checkout@v4

      - name: Sync trigger.yml to geoqiao.github.io
        env:
          G_T: ${{ secrets.G_T }}
        run: |
          git clone https://x-access-token:$G_T@github.com/geoqiao/geoqiao.github.io.git _target
          cp .github/workflows/trigger.yml _target/.github/workflows/trigger.yml
          cd _target
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/workflows/trigger.yml
            git commit -m "sync: update trigger.yml from escaping"
            git push origin main
          fi
