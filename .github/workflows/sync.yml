name: Sync Trigger to Geoqiao Pages

on:
  push:
    paths:
      - '.github/workflows/trigger.yml'
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push trigger.yml to geoqiao.github.io
        env:
          G_T: ${{ secrets.G_T }}
        run: |
          # Get SHA of existing file (if exists) or use empty string for new file
          CONTENT=$(base64 -w0 .github/workflows/trigger.yml)

          # Use GitHub API to create/update trigger.yml directly
          curl -X PUT \
            -H "Authorization: token $G_T" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/geoqiao/geoqiao.github.io/contents/.github/workflows/trigger.yml \
            -d "{\"message\":\"sync: update trigger.yml from github-blog\",\"content\":\"$CONTENT\"}"
