name: Generate and Deploy Site

on:
  workflow_dispatch:
  repository_dispatch:
    types: [issue_update]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Generate and Deploy Site
    runs-on: ubuntu-latest
    # Only allow repository owner to trigger builds via issues (security)
    if: github.event_name != 'issues' || github.repository_owner_id == github.event.issue.user.id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate contents
        run: uv run blog-gen
        env:
          G_T: ${{ secrets.G_T }}

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r output/* _site/
          cp -r templates _site/
          touch _site/.nojekyll

      - name: Clone and push to geoqiao.github.io
        env:
          G_T: ${{ secrets.G_T }}
        run: |
          # Clone geoqiao.github.io
          git clone https://x-access-token:$G_T@github.com/geoqiao/geoqiao.github.io.git _deploy

          # Remove old files (templates, *.md, *.yaml) except .git and .github (workflows)
          cd _deploy
          rm -rf templates *.md *.yaml 2>/dev/null || true
          find . -maxdepth 1 -type f ! -name '.git' -delete 2>/dev/null || true

          # Copy generated site contents
          cp -r ../_site/* .

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: update site from escaping @$GITHUB_SHA"
          git push origin main
