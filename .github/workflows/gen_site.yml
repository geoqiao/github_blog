name: Generate Github_blog site

on:
  workflow_dispatch:
  repository_dispatch:
    types: [issue_update]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Generate Site
    runs-on: ubuntu-latest
    # Only allow repository owner to trigger builds via issues (security)
    if: github.event_name != 'issues' || github.repository_owner_id == github.event.issue.user.id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate contents
        run: uv run blog-gen
        env:
          G_T: ${{ secrets.G_T }}

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r output/* _site/
          cp -r templates _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site
