name: Generate Github_blog site

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Generate Site
    runs-on: ubuntu-latest
    # Only allow repository owner to trigger builds via issues (security)
    if: github.event_name != 'issues' || github.repository_owner_id == github.event.issue.user.id
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # v4 works with Node24, v5 available if needed

      - name: Install uv
        uses: astral-sh/setup-uv@v6  # Updated to v6, latest is v8
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate contents
        run: |
          uv run blog-gen ${{ secrets.G_T }} ${{ github.repository }}

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r output/* _site/          # 复制 output 内容到 _site 根目录
          cp -r templates _site/         # 复制主题文件
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
