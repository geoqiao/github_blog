name: Trigger Deploy

# Syncs to geoqiao.github.io via sync.yml

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger github-blog
        env:
          GH_TOKEN: ${{ secrets.G_T }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/geoqiao/github_blog/dispatches \
            -d '{"event_type":"issue_update"}'
